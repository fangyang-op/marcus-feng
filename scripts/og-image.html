<!doctype html>
<!--
  Open Graph 預覽圖來源(1200×630)。改文字後用 headless Chrome 重新渲染成 /public/og-image.png:
  CHROME=~/Library/Caches/ms-playwright/chromium_headless_shell-1223/chrome-headless-shell-mac-arm64/chrome-headless-shell
  "$CHROME" --headless --hide-scrollbars --force-device-scale-factor=1 \
    --window-size=1200,630 --default-background-color=00000000 \
    --screenshot=public/og-image.png "file://$(pwd)/scripts/og-image.html"
  版面:置中對齊、上下左右留白充足(避免內容靠左失衡)。
-->
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Noto Sans TC", "PingFang TC", "Heiti TC", -apple-system, "Helvetica Neue", sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #18225f 0%, #1c2c91 52%, #1f2fb4 100%);
  }
  /* 柔和光暈 */
  .glow { position: absolute; border-radius: 9999px; filter: blur(90px); }
  .glow-a { width: 560px; height: 560px; top: -200px; right: -150px; background: #2f56ef; opacity: .50; }
  .glow-b { width: 460px; height: 460px; bottom: -220px; left: -160px; background: #1b34cf; opacity: .38; }

  /* 整體置中、四周留白充足 */
  .wrap {
    position: relative; height: 100%;
    padding: 62px 96px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }

  /* 身分列(頭像 + 名字),整列置中 */
  .top { display: flex; align-items: center; gap: 20px; }
  .mark {
    width: 78px; height: 78px; border-radius: 9999px;
    background: linear-gradient(135deg, #5b86fb, #33d6c8);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 31px; letter-spacing: 1px; color: #fff;
  }
  .who { text-align: left; }
  .who .name { font-size: 30px; font-weight: 700; line-height: 1.25; }
  .who .name .role { color: #9db8fd; font-weight: 500; }
  .who .en { font-size: 21px; font-weight: 500; color: #829cdd; letter-spacing: .3px; }

  /* 主訊息:在身分列與網址之間垂直置中 */
  .hero { margin: auto 0; }
  .title { font-size: 84px; font-weight: 800; line-height: 1.14; letter-spacing: -1.5px; }
  .subtitle {
    margin-top: 20px; font-size: 31px; font-style: italic; font-weight: 400;
    color: #a7bffb; letter-spacing: .2px;
  }

  /* 數字徽章,置中排列 */
  .tags { margin-top: 40px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .tag {
    display: inline-flex; align-items: center; gap: 11px;
    background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.17);
    border-radius: 9999px; padding: 14px 26px; font-size: 27px; font-weight: 600;
  }
  .tag b { color: #cdddff; }
  .dot { width: 11px; height: 11px; border-radius: 9999px; }
  .dot-amber  { background: #fbbf24; }
  .dot-teal   { background: #2dd4bf; }
  .dot-violet { background: #a78bfa; }

  /* 底部網址 */
  .url { font-size: 24px; font-weight: 600; color: #8aa3e6; letter-spacing: .4px; }
</style>
</head>
<body>
  <div class="glow glow-a"></div>
  <div class="glow glow-b"></div>
  <div class="wrap">
    <div class="top">
      <div class="mark">MF</div>
      <div class="who">
        <div class="name">馮若陽 Marcus Feng <span class="role">· 資深營運經理</span></div>
        <div class="en">Senior Operations Manager</div>
      </div>
    </div>

    <div class="hero">
      <h1 class="title">懂系統、讓營運規模化的人</h1>
      <div class="subtitle">Operations leader who understands systems — and scales them</div>
      <div class="tags">
        <span class="tag"><span class="dot dot-amber"></span>營收 <b>+140%</b></span>
        <span class="tag"><span class="dot dot-teal"></span>三套自建系統上線</span>
        <span class="tag"><span class="dot dot-violet"></span>資安整改 <b>E → A</b></span>
      </div>
    </div>

    <div class="url">marcus-feng.vercel.app</div>
  </div>
</body>
</html>
